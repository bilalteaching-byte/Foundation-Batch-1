    let totalStudent = 70
    let present = 60

    // === , strict equals to

    let x = true
    let y = 'true'

    if (x === y) { console.log('X and Y Matched') }

    // !=  , not equals to

    let a = 100
    let b = 200 - a

    if (a != b) { console.log('A is not equals to B') }
    else { console.log("A is equals to B") }

    // !== , strict not equals to

    let c = '100'
    let d = 200 - c

    console.log("c=>", c, "d=>", d)

    if (c !== d) { console.log('C is not equals to D') }
    else { console.log("C is equals to D") }
