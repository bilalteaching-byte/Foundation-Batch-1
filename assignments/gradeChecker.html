<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0B0D12; --surface:#12151C; --surface-2:#191D27; --line:rgba(237,235,230,0.09); --line-strong:rgba(237,235,230,0.16); --text:#EDEBE6; --muted:#8A8FA0; --amber:#FFB454; --mint:#6EE7B7; --radius:14px; }
        *{ box-sizing:border-box; }
        body{ margin:0; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; -webkit-font-smoothing:antialiased; }
        a{ color:inherit; text-decoration:none; }
        .mono{ font-family:'JetBrains Mono',monospace; }
        .topbar{ display:flex; align-items:center; justify-content:space-between; padding:18px 6vw; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,13,18,0.85); backdrop-filter:blur(8px); z-index:10; }
        .topbar .back{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); transition:color .2s ease; }
        .topbar .back:hover{ color:var(--amber); }
        .topbar .crumb{ font-size:11.5px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
        .page{ max-width:520px; margin:0 auto; padding:10vh 24px 10vh; }
        h1.title{ font-family:'JetBrains Mono',monospace; font-size:1.6rem; margin:0 0 22px; }
        .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:24px; display:flex; gap:12px; flex-wrap:wrap; }
        input{ background:var(--surface-2); border:1px solid var(--line-strong); color:var(--text); padding:11px 14px; border-radius:8px; font-family:'Manrope',sans-serif; font-size:14px; outline:none; flex:1; min-width:160px; }
        input:focus{ border-color:var(--amber); }
        button{ background:var(--amber); color:#1a1204; border:none; padding:11px 20px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
        button:hover{ transform:translateY(-1px); box-shadow:0 0 0 4px rgba(255,180,84,0.15); }
        #result{ margin-top:20px; font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:600; }
        #result:empty{ display:none; }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="index.html" class="back">← All assignments</a>
        <span class="crumb mono">02 · Conditionals</span>
    </div>

    <div class="page">
        <h1 class="title">Grade Checker</h1>
        <div class="card">
            <input placeholder="Your Percentage" id="user_percent" />
            <button id="check_grade">Check Grade</button>
        </div>
        <p id="result"></p>
    </div>

    <script>
        let userInput = document.querySelector("#user_percent")
        let checkButton = document.querySelector("#check_grade")
        let resultPara = document.querySelector("#result")

        let checkResult = () => {
            console.log(userInput)
            let userPercent = userInput.value
            if (userPercent >= 50) {
                resultPara.innerHTML = "You are Pass"
                resultPara.style.color = "green"
            } else {
                resultPara.innerHTML = "You are FAIL"
                resultPara.style.color = "red"
            }
        }
        checkButton.addEventListener("click", checkResult)

    </script>
</body>

</html>
