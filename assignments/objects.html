<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects</title>
</head>

<body>
    <h1>Objects in html</h1>

    <script>
        let user = {
            firstName: "Bilal",
            lastName: "Raza",
            fatherName: "Muhammad Jawed",
            dob: "asda",
            age: 29,
            isMarried: true,
            siblingNames: ["Ahmed", "Hamza"],
            schoolInfo: {
                name: "SMIT",
                batch: "1"
            },
            city: "Karachi"
        }
        console.log(user)

        console.log(user.firstName)
        console.log(user.siblingNames)
        console.log(user.siblingNames[0])

    </script>
</body>

</html>
