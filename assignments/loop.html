<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Loop</h1>

    <div id="counter"></div>

    <script>
        let paragraph = document.querySelector("#counter")
        // for loop
        // 1.store value in variable
        // 2.increment or decrement the value
        // 3.it should check that work is done till desired number
        for (let x = 1; x <= 100; x++) {
            paragraph.innerHTML += "<p>" + x + "</p>"
        }

    </script>
</body>

</html>
