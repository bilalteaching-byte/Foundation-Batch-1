<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News API Integration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: royalblue;
        }

        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            width: 350px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 12px 20px;
            border: none;
            background-color: royalblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #result {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .number {
            width: 35px;
            height: 35px;
            background-color: royalblue;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .card h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            margin-bottom: 10px;
            line-height: 1.5;
            color: #666;
        }

        .date {
            font-size: 14px;
            color: gray;
        }

        @media (max-width: 768px) {
            #result {
                grid-template-columns: 1fr;
            }

            .search-container {
                flex-direction: column;
            }

            input,
            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <h1>Latest News</h1>

    <div class="search-container">
        <input placeholder="Search News..." id="search_input" />
        <button id="search_btn">Search</button>
    </div>

    <div id="result"></div>

    <script>
        let result = document.getElementById("result");
        let search_input = document.getElementById("search_input");
        let search_btn = document.getElementById("search_btn");

        let renderList = (query = "*") => {
            fetch(`https://newsapi.org/v2/everything?q=${query}&language=en&sortBy=publishedAt&apiKey=32d736e3da1741458a03785551c0b044`)
                .then(res => res.json())
                .then((data) => {

                    result.innerHTML = "";

                    data.articles.forEach((news, index) => {

                        let card = `
                        <div class="card">

                            <div class="number">${index + 1}</div>

                            <img src="${news.urlToImage || 'https://via.placeholder.com/600x300'}">

                            <h4>${news.title}</h4>

                            <p>
                                ${news.description || "No description available."}
                            </p>

                            <p class="date">
                                ${new Date(news.publishedAt).toLocaleString()}
                            </p>

                        </div>
                        `;

                        result.innerHTML += card;
                    });
                })
                .catch((err) => {
                    console.log(err);
                    result.innerHTML = "<h2>Something went wrong!</h2>";
                });
        };

        // Load all news on page load
        renderList();

        // Search functionality
        let searchNews = () => {
            let query = search_input.value.trim();

            if (query === "") {
                renderList();
            } else {
                renderList(query);
            }
        };

        search_btn.addEventListener("click", searchNews);

        search_input.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                searchNews();
            }
        });
    </script>

</body>

</html>
