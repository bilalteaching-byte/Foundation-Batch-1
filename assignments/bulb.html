<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0B0D12; --surface:#12151C; --surface-2:#191D27; --line:rgba(237,235,230,0.09); --line-strong:rgba(237,235,230,0.16); --text:#EDEBE6; --muted:#8A8FA0; --amber:#FFB454; --mint:#6EE7B7; --radius:14px; }
        *{ box-sizing:border-box; }
        body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; -webkit-font-smoothing:antialiased; }
        a{ color:inherit; text-decoration:none; }
        .mono{ font-family:'JetBrains Mono',monospace; }
        .topbar{ display:flex; align-items:center; justify-content:space-between; padding:18px 6vw; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,13,18,0.85); backdrop-filter:blur(8px); z-index:10; }
        .topbar .back{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); transition:color .2s ease; }
        .topbar .back:hover{ color:var(--amber); }
        .topbar .crumb{ font-size:11.5px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
        .page{ max-width:640px; margin:0 auto; padding:8vh 24px 10vh; display:flex; flex-direction:column; align-items:center; text-align:center; }
        h1{ font-family:'JetBrains Mono',monospace; font-size:1.6rem; margin:0 0 30px; }
        #bulb{ max-width:100%; height:auto; border-radius:var(--radius); border:1px solid var(--line); box-shadow:0 20px 50px rgba(0,0,0,0.4); }
        #onOff{ margin-top:28px; background:var(--amber); color:#1a1204; border:none; padding:13px 30px; border-radius:9px; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:14px; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
        #onOff:hover{ transform:translateY(-1px); box-shadow:0 0 0 5px rgba(255,180,84,0.15); }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="index.html" class="back">← All assignments</a>
        <span class="crumb mono">01 · DOM &amp; Events</span>
    </div>

    <div class="page">
        <h1>Bulb On / Off</h1>
        <img src="https://media.istockphoto.com/id/523616495/photo/light-bulb.jpg?b=1&s=612x612&w=0&k=20&c=AO0z6_eLnoVnJ7VFMG_jqviAkaXiXQMvhTc5kamwwSI="
            alt="Bulb is off" id="bulb" height="400" width="600" />
        <button id="onOff">ON</button>
    </div>
</body>
<script>

    let on = "https://images.pexels.com/photos/28214102/pexels-photo-28214102.jpeg"
    let off = "https://media.istockphoto.com/id/523616495/photo/light-bulb.jpg?b=1&s=612x612&w=0&k=20&c=AO0z6_eLnoVnJ7VFMG_jqviAkaXiXQMvhTc5kamwwSI="
    let isBulbOn = false
    let bulbImg = document.querySelector("#bulb")
    let onOffButton = document.querySelector("#onOff")
   
    let onOff = () => {
        if (isBulbOn) {
            bulbImg.src = off
            isBulbOn = false
            onOffButton.innerHTML = "On"
        } else {
            bulbImg.src = on
            isBulbOn = true
            onOffButton.innerHTML = "Off"
        }
    }
   
   onOffButton.addEventListener('click', onOff)
</script>

</html>
