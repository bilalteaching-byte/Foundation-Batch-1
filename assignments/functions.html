<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0B0D12; --surface:#12151C; --surface-2:#191D27; --line:rgba(237,235,230,0.09); --line-strong:rgba(237,235,230,0.16); --text:#EDEBE6; --muted:#8A8FA0; --amber:#FFB454; --mint:#6EE7B7; --radius:14px; }
        *{ box-sizing:border-box; }
        body{ margin:0; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; -webkit-font-smoothing:antialiased; }
        a{ color:inherit; text-decoration:none; }
        .mono{ font-family:'JetBrains Mono',monospace; }
        .topbar{ display:flex; align-items:center; justify-content:space-between; padding:18px 6vw; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,13,18,0.85); backdrop-filter:blur(8px); z-index:10; }
        .topbar .back{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); transition:color .2s ease; }
        .topbar .back:hover{ color:var(--amber); }
        .topbar .crumb{ font-size:11.5px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
        .page{ max-width:520px; margin:0 auto; padding:10vh 24px 10vh; text-align:center; }
        p.label{ font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:0 0 18px; }
        #marks{ font-family:'JetBrains Mono',monospace; font-size:5.5rem; font-weight:700; margin:0 0 40px; color:var(--amber); }
        .btn-row{ display:flex; gap:14px; justify-content:center; }
        button{ border:none; padding:13px 26px; border-radius:9px; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13.5px; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
        #add_marks{ background:var(--mint); color:#0b2a1e; }
        #add_marks:hover{ transform:translateY(-1px); box-shadow:0 0 0 4px rgba(110,231,183,0.18); }
        #deduct_marks{ background:var(--surface-2); color:var(--text); border:1px solid var(--line-strong); }
        #deduct_marks:hover{ transform:translateY(-1px); border-color:var(--amber); }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="index.html" class="back">← All assignments</a>
        <span class="crumb mono">01 · DOM &amp; Events</span>
    </div>

    <div class="page">
        <p class="label">Score</p>
        <h1 id="marks">50</h1>
        <div class="btn-row">
            <button id="add_marks">Add Marks</button>
            <button id="deduct_marks">Deduct Marks</button>
        </div>
    </div>
</body>

<script>
    let marksH1 = document.querySelector("#marks")
    let addButton = document.querySelector("#add_marks")
    let deductButton = document.querySelector("#deduct_marks")
    //arrow function
    let addMarks = () => {
        if (marksH1.innerHTML < 100) {
            marksH1.innerHTML = +marksH1.innerHTML + 5
        }
    }

    let deductMarks = () => {
        if (marksH1.innerHTML > 0) {
            marksH1.innerHTML -= 5
        }
    }

    addButton.addEventListener("click", addMarks)
    deductButton.addEventListener("click", deductMarks)

</script>

</html>
